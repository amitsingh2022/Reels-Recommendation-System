name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test-and-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy app training tests

      - name: Unit tests (pytest)
        run: pytest -q

      - name: API smoke check
        env:
          MODEL_ADMIN_API_KEY: ci-secret
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > uvicorn.log 2>&1 &
          PID=$!
          sleep 5
          curl -f http://127.0.0.1:8000/health/live
          curl -f http://127.0.0.1:8000/health/ready
          curl -f "http://127.0.0.1:8000/recommend?user_id=1&top_k=5"
          kill $PID
